<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUDE AI</title>

<style>
body{
  background: radial-gradient(circle, #020617, #000);
  color: #38bdf8;
  font-family: Arial;
  text-align: center;
}

#robot{
  font-size: 90px;
  margin-top: 20px;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from { text-shadow: 0 0 10px #38bdf8; }
  to { text-shadow: 0 0 30px #0ea5e9; }
}

input{
  padding: 12px;
  width: 70%;
  max-width: 300px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button{
  padding: 10px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  background: #0ea5e9;
  color: white;
}

#text{
  margin-top: 20px;
  font-size: 20px;
  color: #22c55e;
}
</style>
</head>

<body>

<h1>DUDE AI 🤖</h1>
<div id="robot">🤖</div>

<input type="text" id="input" placeholder="Ask something...">
<br>

<button onclick="sendText()">Send</button>
<button onclick="start()">🎤 Speak</button>

<h2 id="text">DUDE is ready...</h2>

<script>

// 🔊 VOICE (mobile fix)
function speak(text){
  let speech = new SpeechSynthesisUtterance(text);
  speech.pitch = 1;
  speech.rate = 1;
  speech.volume = 1;

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}

// 👆 unlock mobile voice
document.body.addEventListener("click", () => {
  speechSynthesis.resume();
});

// 🎲 random reply
function random(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

// show text
function show(text){
  document.getElementById("text").innerText = text;
}

// enter support
document.getElementById("input").addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendText();
  }
});

// send
function sendText(){
  let text = document.getElementById("input").value;
  document.getElementById("input").value = "";
  handle(text);
}

// 🎤 mic
function start(){
  let recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = function(event){
    let text = event.results[0][0].transcript;
    handle(text);
  };

  recognition.start();
}

// 🧠 MAIN AI
function handle(text){
  text = text.toLowerCase();

  // open
  if(text.includes("open youtube")){
    speak("Opening YouTube");
    window.open("https://youtube.com", "_blank");
    return;
  }

  if(text.includes("open google")){
    speak("Opening Google");
    window.open("https://google.com", "_blank");
    return;
  }

  // greeting
  if(text.includes("hi") || text.includes("hello")){
    let reply = random([
      "Hello bro 😎 bol ki help korte pari",
      "Hi boss 🔥 ki lagbe",
      "Hey 😏 ami ready achi"
    ]);
    show(reply);
    speak(reply);
    return;
  }

  // how are you
  if(text.includes("how are you") || text.includes("kemon acho")){
    let reply = random([
      "Ami valo achi bro 😎",
      "Full ready 🔥",
      "Tui bol kemon achis"
    ]);
    show(reply);
    speak(reply);
    return;
  }

  // what doing
  if(text.includes("ki korchish")){
    let reply = random([
      "Tor jonno wait kortesi 😎",
      "Boshe achi bro 😏",
      "Tor command er opekkha"
    ]);
    show(reply);
    speak(reply);
    return;
  }

  // name
  if(text.includes("your name")){
    let reply = random([
      "Ami DUDE AI 🤖",
      "Tui amake DUDE bole dakbi 😎"
    ]);
    show(reply);
    speak(reply);
    return;
  }

  // default search
  speak("Searching on Google");
  window.open("https://google.com/search?q=" + text, "_blank");
}

</script>

</body>
</html>
